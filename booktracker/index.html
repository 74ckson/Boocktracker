<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <!-- Metadados essenciais para qualquer página web -->
    <meta charset="UTF-8" />
    <!-- viewport define que a página é responsiva em dispositivos móveis -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookTracker - Acompanhe suas Leituras</title>
  </head>
  <body>
    <!-- 
      O elemento com id="root" é onde o React vai montar toda a aplicação.
      Tudo que você vê na tela é renderizado dentro deste div pelo React.
    -->
    <div id="root"></div>
    <!-- 
      main.js é o ponto de entrada da aplicação React.
      O Vite injeta este arquivo automaticamente durante o desenvolvimento.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
